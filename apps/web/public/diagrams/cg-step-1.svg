<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="ui-serif, Georgia, serif">
  <rect width="600" height="280" fill="#0A0A0B"/>
  <rect width="600" height="280" fill="#D4B896" opacity="0.04"/>

  <text x="300" y="28" text-anchor="middle" fill="#888" font-size="11" font-style="italic">起手 · Pi 自己的 GND 圈</text>

  <!-- Pi 4 -->
  <g>
    <rect x="80" y="100" width="160" height="100" fill="#0A0A0B" stroke="#888" stroke-width="2"/>
    <text x="160" y="135" text-anchor="middle" fill="#EDEDED" font-size="14">Pi 4</text>
    <text x="160" y="155" text-anchor="middle" fill="#888" font-size="9" font-style="italic">5V 供电</text>

    <!-- Pi 内部 GND 圈 -->
    <ellipse cx="160" cy="180" rx="50" ry="10" fill="none" stroke="#7FBF6E" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="160" y="184" text-anchor="middle" fill="#7FBF6E" font-size="9">Pi GND 圈</text>
  </g>

  <!-- 标签 -->
