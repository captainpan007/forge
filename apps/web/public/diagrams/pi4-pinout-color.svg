    <rect x="50" y="-10" width="14" height="14" fill="#FF6B6B"/>
    <text x="70" y="0" fill="#EDEDED" font-size="10">5V</text>
    <rect x="100" y="-10" width="14" height="14" fill="#fdba74"/>
    <text x="120" y="0" fill="#EDEDED" font-size="10">3.3V</text>
    <rect x="160" y="-10" width="14" height="14" fill="#444"/>
    <text x="180" y="0" fill="#EDEDED" font-size="10">GND</text>
    <rect x="220" y="-10" width="14" height="14" fill="#7FBF6E"/>
