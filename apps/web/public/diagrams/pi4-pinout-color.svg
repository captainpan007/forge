<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 580" font-family="ui-serif, Georgia, serif">
  <rect width="700" height="580" fill="#0A0A0B"/>
  <rect width="700" height="580" fill="#D4B896" opacity="0.04"/>

  <!-- Title -->
