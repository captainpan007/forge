name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-validate:
    name: Lint · Typecheck · Validate Graph
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本由 package.json 的 "packageManager" 字段决定（pnpm@9.12.0）
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate Knowledge Graph
        run: pnpm validate-graph

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # pnpm 版本由 package.json 的 "packageManager" 字段决定（pnpm@9.12.0）
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # CI 用 placeholder，本地 / Vercel 才用真值
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmstcGxhY2Vob2xkZXItdGVzdCQ
          CLERK_SECRET_KEY: sk_test_placeholder
          TURSO_DATABASE_URL: file:./forge.db
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: pnpm build
