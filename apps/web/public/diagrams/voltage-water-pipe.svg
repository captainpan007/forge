<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="ui-serif, Georgia, serif">
  <!-- Background: paper feel -->
  <rect width="700" height="380" fill="#0A0A0B"/>
  <rect width="700" height="380" fill="#D4B896" opacity="0.04"/>

  <!-- Title -->
  <text x="350" y="38" text-anchor="middle" fill="#EDEDED" font-size="20" font-style="italic">水管类比 · 电路三要素</text>
  <line x1="220" y1="48" x2="480" y2="48" stroke="#C8623A" stroke-width="1" opacity="0.4"/>

  <!-- ════════════════════════════════════════ -->
  <!-- LEFT SIDE: water tower + pipe + drain    -->
  <!-- ════════════════════════════════════════ -->

  <!-- Water tower (high reservoir) -->
  <g stroke="#C8623A" stroke-width="2" fill="none">
    <!-- Tower base -->
    <line x1="100" y1="280" x2="100" y2="120"/>
    <line x1="160" y1="280" x2="160" y2="120"/>
    <!-- Reservoir top -->
    <ellipse cx="130" cy="120" rx="30" ry="8"/>
    <path d="M 100 120 L 100 100 L 160 100 L 160 120" />
  </g>
  <!-- Water inside reservoir -->
  <rect x="103" y="105" width="54" height="172" fill="#4A8FB8" opacity="0.25"/>
  <text x="130" y="92" text-anchor="middle" fill="#C8623A" font-size="11" font-style="italic">高水位</text>

  <!-- Drain pool (low reservoir) -->
  <g stroke="#C8623A" stroke-width="2" fill="none">
    <ellipse cx="540" cy="290" rx="60" ry="10"/>
    <path d="M 480 290 L 488 320 Q 540 335 592 320 L 600 290"/>
  </g>
  <ellipse cx="540" cy="290" rx="58" ry="9" fill="#4A8FB8" opacity="0.35"/>
  <text x="540" y="345" text-anchor="middle" fill="#C8623A" font-size="11" font-style="italic">水池（地）</text>

  <!-- Connecting pipe -->
  <g stroke="#888" stroke-width="3" fill="none">
    <path d="M 130 280 L 130 295 L 540 295 L 540 290" />
  </g>

  <!-- Water flow arrows along pipe -->
  <g fill="#4A8FB8" opacity="0.9">
    <polygon points="220,289 230,294 220,299"/>
    <polygon points="320,289 330,294 320,299"/>
    <polygon points="420,289 430,294 420,299"/>
  </g>

  <!-- Pressure label (left side near tower) -->
  <g>
    <line x1="60" y1="105" x2="60" y2="280" stroke="#C8623A" stroke-width="1.5" stroke-dasharray="3,3"/>
    <polygon points="56,105 64,105 60,98" fill="#C8623A"/>
    <polygon points="56,280 64,280 60,287" fill="#C8623A"/>
    <text x="35" y="200" fill="#C8623A" font-size="13" text-anchor="middle" transform="rotate(-90 35 200)">水压差 = 电压（V）</text>
  </g>

  <!-- Flow label (above middle of pipe) -->
  <g>
    <text x="335" y="280" text-anchor="middle" fill="#4A8FB8" font-size="13">水流量 = 电流（I）</text>
  </g>

  <!-- Drain label arrow -->
  <g>
    <text x="540" y="270" text-anchor="middle" fill="#888" font-size="12" font-style="italic">最终回流点</text>
  </g>

  <!-- ════════════════════════════════════════ -->
  <!-- RIGHT SIDE: corresponding electric circuit  -->
  <!-- ════════════════════════════════════════ -->

  <!-- Equals sign in middle (subtle) -->
  <text x="350" y="180" text-anchor="middle" fill="#888" font-size="32" opacity="0.3">≈</text>

  <!-- Bottom band: mapping table -->
  <g transform="translate(0, 350)">
    <text x="120" y="0" text-anchor="middle" fill="#888" font-size="10" font-style="italic">水压</text>
    <text x="120" y="14" text-anchor="middle" fill="#C8623A" font-size="11">→ 电压 V (volts)</text>

    <text x="350" y="0" text-anchor="middle" fill="#888" font-size="10" font-style="italic">水流量</text>
    <text x="350" y="14" text-anchor="middle" fill="#4A8FB8" font-size="11">→ 电流 I (amperes)</text>

    <text x="540" y="0" text-anchor="middle" fill="#888" font-size="10" font-style="italic">水池</text>
    <text x="540" y="14" text-anchor="middle" fill="#888" font-size="11">→ 地 GND (0V)</text>
  </g>

  <!-- Subtle "hand-drawn" annotation in corner -->
  <text x="650" y="370" fill="#888" font-size="9" text-anchor="end" font-style="italic" opacity="0.6">forge · N04</text>
</svg>
