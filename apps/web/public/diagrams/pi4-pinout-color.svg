  <text x="480" y="105" text-anchor="middle" fill="#888" font-size="11" font-style="italic">BCM / 物理</text>

  <!-- Pin definitions: 20 pairs, alternating left + right -->
  <!-- Each pin is rendered as a colored rectangle + text -->

  <!-- Define pin layout. Left column = odd pins (1,3,5...39). Right column = even pins (2,4,6...40) -->

  <!-- Helper structure done inline; each row at y = 130 + 20*row, row 0-19 -->

  <!-- Row 0 (pin 1, 2) -->
  <g transform="translate(0, 120)">
