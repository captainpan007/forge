  </text>
  <text x="300" y="262" text-anchor="middle" fill="#888" font-size="10" font-style="italic">
    Pi 自己有一套「电位参考系」
  </text>

  <text x="585" y="270" fill="#888" font-size="8" text-anchor="end" opacity="0.6" font-style="italic">forge · N04 · step 1</text>
