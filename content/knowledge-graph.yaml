# forge.dev · Knowledge Graph
#
# 这是 forge 的核心数据结构。每个项目的所有原子知识节点 + 依赖关系全部在这里定义。
#
# Schema:
#   projects.<slug>:
#     title, tagline, learning_path (节点 ID 的有序列表)
#   nodes[]:
#     id:          唯一 ID (n01...nNN) — 全局唯一
#     slug:        URL 友好别名 — 全局唯一
#     title:       中文标题
#     phase:       阶段编号（项目内部 scope）
#     phase_name:  阶段中文名
#     project:     primary project (Why 节的语境基于这个)
#     order:       项目内顺序
#     duration:    预计分钟数 (-1 = 无穷)
#     difficulty:  1-5
#     depends_on:  前置节点 ID 列表
#     unlocks:     完成后解锁的节点 ID 列表（反向冗余）
#     tags:        标签
#
# 一致性由 scripts/validate-graph.ts 检查。

# ═══════════════════════════════════════════════════
# Projects
# ═══════════════════════════════════════════════════

projects:
  soundbox:
    title: 发声盒
    tagline: 大蘑菇按钮 + 树莓派 + 喇叭，按一下随机播放声音 — 给儿子的第一个 dad-made 玩具
    target_audience: 39 岁零基础家长
    estimated_total_hours: 12
    estimated_calendar_weeks: 2
    hardware_required:
      - Raspberry Pi 4B
      - microSD 32GB
      - USB-C 5V/3A 电源
      - 大蘑菇按钮 (≥6cm)
      - USB 小喇叭或 3.5mm 音箱
      - 杜邦线
      - 塑料密封盒
      - (可选) 18650 电池盒供电
    learning_path:
      # Phase 1: 心智模型
      - n01
      - n02
      - n03
      - n04
      - n05
      - n06
      - n07
      # Phase 2: 第一次握手
      - n08
      - n09
      - n10
      - n11
      - n12
      # Phase 3: 软件能力
      - n13
      - n14
      - n15
      - n16
