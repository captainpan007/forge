  smart-car:
    title: 智能小车
    tagline: 4WD 自动避障 + 第一视角直播 + 手机遥控 — 你的"驾驶舱级"项目
    target_audience: 完成发声盒后的进阶
    estimated_total_hours: 30
    estimated_calendar_weeks: 5
    hardware_required:
      - Raspberry Pi 4B
      - 4WD 亚克力底盘 + 4 个 TT 减速电机
      - L298N 双 H 桥驱动板（或类似）
      - 2-3 个 HC-SR04 超声波模块
      - Pi CSI 摄像头模块
      - SG90 舵机（摄像头云台）
      - 7.4V/12V 锂电池组 + DC 电源
      - 杜邦线、螺丝、螺丝刀
      - (套件已含以上全部 — 创乐博 4WD 树莓派智能小车)
    # learning_path 复用了 13 个 soundbox 共通基础 + 34 个小车专属新节点
    # 这是 forge 知识图谱真正的威力 — 小车不用从零学一遍
    learning_path:
      # Phase 1: 共通基础（复用自 soundbox）
      - n02  # Linux 30s
