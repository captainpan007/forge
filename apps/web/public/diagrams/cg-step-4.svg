<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" font-family="ui-serif, Georgia, serif">
  <rect width="600" height="280" fill="#0A0A0B"/>
  <rect width="600" height="280" fill="#D4B896" opacity="0.04"/>

  <text x="300" y="28" text-anchor="middle" fill="#7FBF6E" font-size="11" font-style="italic">加一根黑线 · 两个 GND 圈合并 · 喇叭响</text>

  <!-- Pi 4 -->
  <g>
    <rect x="50" y="100" width="160" height="100" fill="#0A0A0B" stroke="#888" stroke-width="2"/>
    <text x="130" y="135" text-anchor="middle" fill="#EDEDED" font-size="14">Pi 4</text>
    <text x="130" y="155" text-anchor="middle" fill="#888" font-size="9" font-style="italic">5V 供电</text>
    <!-- Pi GPIO pin -->
    <circle cx="210" cy="120" r="4" fill="#C8623A"/>
    <text x="220" y="124" fill="#C8623A" font-size="10">GPIO 17</text>
    <!-- Pi GND pin -->
    <circle cx="210" cy="180" r="4" fill="#fff"/>
    <text x="220" y="184" fill="#fff" font-size="10">GND</text>
  </g>

  <!-- 喇叭模块 -->
  <g>
    <rect x="370" y="100" width="180" height="100" fill="#0A0A0B" stroke="#888" stroke-width="2"/>
    <text x="460" y="135" text-anchor="middle" fill="#EDEDED" font-size="13">外置喇叭模块</text>
    <text x="460" y="155" text-anchor="middle" fill="#888" font-size="9" font-style="italic">独立 9V 电池供电</text>
    <circle cx="370" cy="120" r="4" fill="#C8623A"/>
    <text x="365" y="124" text-anchor="end" fill="#C8623A" font-size="10">IN</text>
    <circle cx="370" cy="180" r="4" fill="#fff"/>
    <text x="365" y="184" text-anchor="end" fill="#fff" font-size="10">GND</text>
  </g>

  <!-- 信号线 -->
  <line x1="214" y1="120" x2="366" y2="120" stroke="#C8623A" stroke-width="3"/>
  <text x="290" y="110" text-anchor="middle" fill="#C8623A" font-size="11">信号线</text>

  <!-- 黑线 GND 共连（新加 · 闪烁突出） -->
  <line x1="214" y1="180" x2="366" y2="180" stroke="#7FBF6E" stroke-width="3.5">
    <animate attributeName="stroke-width" values="3;5;3" dur="1.4s" repeatCount="indefinite"/>
  </line>
  <text x="290" y="200" text-anchor="middle" fill="#7FBF6E" font-size="11">⬅ 共同 GND（新加）</text>

  <!-- 大 GND 圈包住两个模块 -->
  <ellipse cx="300" cy="180" rx="270" ry="20" fill="none" stroke="#7FBF6E" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- 喇叭响 ✓ -->
  <g transform="translate(490, 60)">
    <text fill="#7FBF6E" font-size="24" text-anchor="middle">♪</text>
    <text x="0" y="20" fill="#7FBF6E" font-size="10" text-anchor="middle">响了</text>
  </g>

  <text x="300" y="245" text-anchor="middle" fill="#EDEDED" font-size="13">
    一根黑线把两个 GND 圈合并成一个
  </text>
  <text x="300" y="262" text-anchor="middle" fill="#7FBF6E" font-size="11" font-style="italic">
    现在喇叭能解释 Pi 的「高电平」是相对什么的 3.3V
  </text>

  <text x="585" y="270" fill="#888" font-size="8" text-anchor="end" opacity="0.6" font-style="italic">forge · N04 · step 4</text>
</svg>
